<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apps Script 코드 (Code.gs)</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #1e1e2e; color: #e0e0e0; margin: 0; padding: 20px; }
  h1 { font-size: 18px; }
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  button {
    background: #5b6ef7; color: #fff; border: none; border-radius: 6px;
    padding: 10px 18px; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  button:hover { background: #4a5ce0; }
  button.copied { background: #22d3a0; }
  pre {
    background: #11111b; border: 1px solid #313244; border-radius: 8px;
    padding: 16px; overflow: auto; font-size: 13px; line-height: 1.5;
    white-space: pre; max-height: 80vh;
  }
  .hint { color: #a6adc8; font-size: 13px; }
</style>
</head>
<body>
  <h1>Apps Script 코드 (Code.gs)</h1>
  <div class="toolbar">
    <button id="copyBtn" onclick="copyCode()">📋 코드 전체 복사</button>
    <span class="hint">버튼 클릭 후 Apps Script 편집기에 전체 선택(Ctrl+A) → 붙여넣기(Ctrl+V) 해주세요.</span>
  </div>
  <pre id="code">불러오는 중...</pre>

  <script>
    async function loadCode() {
      try {
        const res = await fetch('Code.gs?v=' + Date.now());
        const text = await res.text();
        document.getElementById('code').textContent = text;
      } catch(e) {
        document.getElementById('code').textContent = '코드를 불러오지 못했습니다: ' + e.message;
      }
    }
    async function copyCode() {
      const text = document.getElementById('code').textContent;
      try {
        await navigator.clipboard.writeText(text);
      } catch(e) {
        // 클립보드 API 사용 불가 시 폴백
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
      }
      const btn = document.getElementById('copyBtn');
      const original = btn.textContent;
      btn.textContent = '✅ 복사 완료!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = original; btn.classList.remove('copied'); }, 2000);
    }
    loadCode();
  </script>
</body>
</html>
